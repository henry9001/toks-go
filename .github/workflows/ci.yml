name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go-version: ["1.22", "1.23", "1.24", "1.25"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}
      - name: go vet
        run: go vet ./...
      - name: Run tests
        run: go test -race -cover -coverprofile=coverage.out ./...
      - name: Enforce 80% coverage
        if: matrix.go-version == '1.25'
        run: |
          COV=$(go tool cover -func=coverage.out | grep ^total | awk '{print substr($3,1,length($3)-1)}')
          echo "Coverage: ${COV}%"
          if [ "$(echo "$COV < 80" | bc -l)" -eq 1 ]; then
            echo "::error::Coverage ${COV}% is below 80%"
            exit 1
          fi

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
      - name: Install staticcheck
        run: go install honnef.co/go/tools/cmd/staticcheck@latest
      - name: staticcheck
        run: staticcheck ./...
      - name: gofmt
        run: |
          UNFORMATTED=$(gofmt -l .)
          if [ -n "$UNFORMATTED" ]; then
            echo "::error::Files not formatted: $UNFORMATTED"
            exit 1
          fi
